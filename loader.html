<body style="background-color: black;">
         <nav class="nav" style="flex-direction: row;display: flex;justify-content: space-between;width:100%;position: absolute;padding:40px;user-select: none;">
    <a href="https://subsussp.github.io/THE/" id="head" target="_blank" data-has-parsed="true">
        <div id="htext" class="sfxbtn" style="color: white;width: 100%;">
          THE
      </div> 
    </a>
    <ul style="
    align-self: center;margin: 0;
">
      <li>
        <div class="disposable">
          <canvas id="wave" style="cursor: pointer;height: 100%;opacity: 0;" class="sfxbtn"></canvas>
        </div>
      </li>
    </ul>
  </nav>
  <div id="loader-cont" style="background-color: black;width: 100%;height: 100%;position: absolute;z-index: 400;">
</div>
  <canvas id="wave2" style="position: absolute;top: 50%;left: 50%;transform: translate(-50%,-50%);transform-origin: center;z-index: 500;">    
    </canvas>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script>
        
    let canvas2 = document.getElementById('wave') 
    let canvas = document.getElementById('wave2') 
    const ctx = canvas.getContext("2d");
    const ctx2 = canvas2.getContext("2d");
    canvas2.height = 20
    canvas2.width = 20 * 6 / 3
    canvas.height = 20
    canvas.width = 20 * 6 / 3
    let pheta2 = 0
    let opacity = {o:1}
    function drawlines2(pheta2,startingH = canvas2.height,off = 0){
    ctx.beginPath()
    ctx2.beginPath()
    for(let i =0; i < canvas2.width / 6 ;i++){
        let y = Math.sin((pheta2 + i * .5))
        ctx2.moveTo(10.5 + i * 4,startingH )
        ctx2.lineTo(10.5 + i * 4,startingH + off + (y * 7 - 8) * 2 * .5 * opacity.o)
        ctx.moveTo(10.5 + i * 4,startingH )
        ctx.lineTo(10.5 + i * 4,startingH + off + (y * 7 - 8) * 2 * .5 * opacity.o)
    }
    ctx.strokeStyle = "#ffffff"; 
    ctx.lineWidth = 1;    
    ctx.stroke()
    ctx2.strokeStyle = "#ffffff"; 
    ctx2.lineWidth = 1;    
    ctx2.stroke()
    }

    function loop2(){
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        ctx2.clearRect(0, 0, canvas2.width, canvas2.height); 
        if(pheta2 >= 360){
            pheta2 = 0
        }
        let phetaR = pheta2 * Math.PI / 180
        pheta2 += 2 * 4 * 0.5
        drawlines2(phetaR,undefined,-3)
        requestAnimationFrame(loop2)
    }
    loop2()
    let timeline = gsap.timeline({
        delay:0.4,
        defaults:{
            ease:'power3.inOut',
            duration:3,
        }
    })
    timeline.fromTo('#wave2',{
        scale: 2.5,
    },{
        scale:1,
        x:window.innerWidth/ 2 - 60,
        y:-window.innerHeight/ 2 + 50,
    })
    .to('#loader-cont',{
        opacity:0
    },"<")
    .to(opacity,
    {o:0})
    .to('#wave',{
            opacity:1,
            duration:3,
    }).to('#wave2',{
        opacity:0,
        duration:3,
        onComplete:()=>{
            document.getElementById('loader-cont').remove()         
            canvas.remove()
        }
        },'<')
    </script>
</body>
